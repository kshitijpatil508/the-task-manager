<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — The Task Manager</title>
  <meta name="description" content="Admin panel for managing Task Manager users and data.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass-card { background: rgba(17,24,39,0.85); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .admin-badge { background: linear-gradient(135deg, #dc2626, #b91c1c); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased">

  <!-- AUTH -->
  <div id="admin-auth" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-sm p-8">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl admin-badge mb-3">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <h1 class="text-xl font-bold text-red-400">Admin Panel</h1>
        <p class="text-gray-500 text-xs mt-1">The Task Manager</p>
      </div>
      <form id="admin-login-form" class="space-y-4">
        <input id="admin-username" type="text" required placeholder="Admin Username" class="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-700 text-sm focus:ring-2 focus:ring-red-500 outline-none transition">
        <input id="admin-password" type="password" required placeholder="Admin Password" class="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-700 text-sm focus:ring-2 focus:ring-red-500 outline-none transition">
        <div id="admin-login-error" class="text-red-500 text-sm text-center hidden"></div>
        <button type="submit" class="w-full py-3.5 rounded-xl admin-badge text-white font-semibold text-sm hover:opacity-90 transition">Sign In as Admin</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="admin-dashboard" class="hidden">
    <header class="sticky top-0 z-50 bg-gray-950/90 backdrop-blur border-b border-gray-800/50">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl admin-badge flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          </div>
          <div>
            <h1 class="text-lg font-bold">Admin Panel</h1>
            <p class="text-xs text-gray-500">User Management</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span id="admin-user-label" class="text-xs font-semibold text-red-400 bg-red-900/30 px-3 py-1.5 rounded-lg"></span>
          <button id="admin-logout" class="p-2 rounded-xl hover:bg-gray-800 transition">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
      <!-- Stats -->
      <div id="admin-stats" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6"></div>

      <!-- Actions bar -->
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">All Users</h2>
        <button id="admin-create-btn" class="px-4 py-2.5 rounded-xl admin-badge text-white text-sm font-semibold hover:opacity-90 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Create User
        </button>
      </div>

      <!-- User Table -->
      <div class="glass-card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-800">
                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">User ID</th>
                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>
                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">PIN</th>
                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Stats</th>
                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">Created</th>
                <th class="px-6 py-4 text-right text-xs font-semibold text-gray-400 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="admin-users-tbody"></tbody>
          </table>
        </div>
        <div id="admin-empty-state" class="hidden text-center py-12 text-gray-500">
          <p class="text-lg font-semibold">No users yet</p>
          <p class="text-sm mt-1">Create the first user to get started</p>
        </div>
      </div>
    </main>
  </div>

  <!-- CREATE / EDIT MODAL -->
  <div id="admin-modal" class="modal-overlay hidden">
    <div class="glass-card p-6 sm:p-8 w-full max-w-md mx-4 fade-in">
      <div class="flex items-center justify-between mb-6">
        <h2 id="modal-title" class="text-lg font-bold">Create User</h2>
        <button id="modal-close" class="p-2 rounded-xl hover:bg-gray-800 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="modal-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5">User ID</label>
          <input id="modal-userId" type="text" required placeholder="e.g. john" class="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-700 text-sm focus:ring-2 focus:ring-red-500 outline-none transition">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5">Password</label>
          <input id="modal-password" type="password" placeholder="Min 8 characters" class="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-700 text-sm focus:ring-2 focus:ring-red-500 outline-none transition">
        </div>
        <div id="modal-reset-pin-row" class="hidden">
          <label class="flex items-center gap-3 p-4 rounded-xl bg-gray-800/50 cursor-pointer">
            <input id="modal-reset-pin" type="checkbox" class="w-4 h-4 rounded accent-red-500">
            <span class="text-sm font-medium">Reset Recovery PIN</span>
          </label>
        </div>
        <div id="modal-error" class="text-red-500 text-sm text-center hidden"></div>
        <button type="submit" id="modal-submit" class="w-full py-3 rounded-xl admin-badge text-white font-semibold text-sm hover:opacity-90 transition">Create</button>
      </form>
    </div>
  </div>

  <!-- CONFIRM DELETE MODAL -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="glass-card p-6 sm:p-8 w-full max-w-sm mx-4 text-center fade-in">
      <div class="w-12 h-12 rounded-full bg-red-900/30 text-red-500 mx-auto flex items-center justify-center mb-4">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </div>
      <h3 class="text-lg font-bold mb-2">Delete User?</h3>
      <p id="delete-modal-msg" class="text-sm text-gray-400 mb-6">This will permanently delete the user and all their data.</p>
      <div class="flex gap-3">
        <button id="delete-cancel" class="flex-1 py-2.5 rounded-xl bg-gray-800 text-gray-300 font-semibold text-sm hover:bg-gray-700 transition">Cancel</button>
        <button id="delete-confirm" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white font-semibold text-sm hover:bg-red-700 transition">Delete</button>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
